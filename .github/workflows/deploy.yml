name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      # Guard against the raw repository source going live again (this
      # happens when the repo's Pages source is "Deploy from a branch":
      # the legacy branch build races this deployment and overwrites it).
      - name: Verify the built app is live
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          for i in $(seq 1 12); do
            html=$(curl -sL "$url" || true)
            if echo "$html" | grep -q '/assets/index-'; then
              echo "Live site serves the built app."
              exit 0
            fi
            echo "Attempt $i: built app not live yet, retrying..."
            sleep 10
          done
          echo "::error::$url is still serving the unbuilt repository source. Check Settings → Pages → Source = GitHub Actions, then re-run this workflow."
          exit 1
